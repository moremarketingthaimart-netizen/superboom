name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    name: Validate marketplace + plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check marketplace manifest
        run: |
          echo "Checking marketplace structure..."
          test -f .claude-plugin/marketplace.json && echo "✓ .claude-plugin/marketplace.json" || (echo "✗ Missing .claude-plugin/marketplace.json" && exit 1)
          test -f README.md && echo "✓ README.md" || (echo "✗ Missing README.md" && exit 1)

      - name: Check plugin files
        run: |
          echo "Checking plugin structure..."
          PLUGIN_DIR="plugins/superboom"

          test -f "$PLUGIN_DIR/.claude-plugin/plugin.json" && echo "✓ plugin.json" || (echo "✗ Missing $PLUGIN_DIR/.claude-plugin/plugin.json" && exit 1)

          SKILLS=(workflow-setup github-setup agent-team security-audit migration pr-review daily-digest plugin-scaffold)
          for skill in "${SKILLS[@]}"; do
            test -f "$PLUGIN_DIR/skills/$skill/SKILL.md" \
              && echo "✓ skills/$skill" \
              || (echo "✗ Missing $PLUGIN_DIR/skills/$skill/SKILL.md" && exit 1)
          done

          AGENTS=(security-reviewer code-researcher devops-specialist)
          for agent in "${AGENTS[@]}"; do
            test -f "$PLUGIN_DIR/agents/$agent.md" \
              && echo "✓ agents/$agent" \
              || (echo "✗ Missing $PLUGIN_DIR/agents/$agent.md" && exit 1)
          done

          test -f "$PLUGIN_DIR/hooks/hooks.json" && echo "✓ hooks.json" || (echo "✗ Missing $PLUGIN_DIR/hooks/hooks.json" && exit 1)

          echo ""
          echo "✅ All plugin files present"

      - name: Validate JSON files
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))" && echo "✓ marketplace.json valid JSON"
          python3 -c "import json; json.load(open('plugins/superboom/.claude-plugin/plugin.json'))" && echo "✓ plugin.json valid JSON"
          python3 -c "import json; json.load(open('plugins/superboom/hooks/hooks.json'))" && echo "✓ hooks.json valid JSON"

      - name: Validate SKILL.md frontmatter
        run: |
          for skill_file in plugins/superboom/skills/*/SKILL.md; do
            if ! head -5 "$skill_file" | grep -q "^---"; then
              echo "✗ $skill_file missing YAML frontmatter" && exit 1
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "✗ $skill_file missing 'description'" && exit 1
            fi
            echo "✓ $skill_file"
          done

      - name: Validate agent frontmatter
        run: |
          for agent_file in plugins/superboom/agents/*.md; do
            if ! head -3 "$agent_file" | grep -q "^---"; then
              echo "✗ $agent_file missing frontmatter" && exit 1
            fi
            echo "✓ $agent_file"
          done

      - name: Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  superboom marketplace validation PASSED ✅"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Skills: $(ls plugins/superboom/skills/ | wc -l | tr -d ' ')"
          echo "Agents: $(ls plugins/superboom/agents/*.md | wc -l | tr -d ' ')"
          echo "Version: $(python3 -c \"import json; print(json.load(open('plugins/superboom/.claude-plugin/plugin.json'))['version'])\")"
