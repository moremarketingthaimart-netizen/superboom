name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "Checking plugin structure..."

          # Required root files
          test -f .claude-plugin/plugin.json && echo "✓ plugin.json" || (echo "✗ Missing .claude-plugin/plugin.json" && exit 1)
          test -f marketplace.json && echo "✓ marketplace.json" || (echo "✗ Missing marketplace.json" && exit 1)
          test -f README.md && echo "✓ README.md" || (echo "✗ Missing README.md" && exit 1)

          # Required skills
          SKILLS=(workflow-setup github-setup agent-team security-audit migration pr-review daily-digest plugin-scaffold)
          for skill in "${SKILLS[@]}"; do
            test -f "skills/$skill/SKILL.md" && echo "✓ skills/$skill/SKILL.md" || (echo "✗ Missing skills/$skill/SKILL.md" && exit 1)
          done

          # Required agents
          AGENTS=(security-reviewer code-researcher devops-specialist)
          for agent in "${AGENTS[@]}"; do
            test -f "agents/$agent.md" && echo "✓ agents/$agent.md" || (echo "✗ Missing agents/$agent.md" && exit 1)
          done

          # Hooks
          test -f hooks/hooks.json && echo "✓ hooks/hooks.json" || (echo "✗ Missing hooks/hooks.json" && exit 1)

          echo ""
          echo "✅ All plugin files present"

      - name: Validate JSON files
        run: |
          echo "Validating JSON syntax..."
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))" && echo "✓ plugin.json valid JSON"
          python3 -c "import json; json.load(open('marketplace.json'))" && echo "✓ marketplace.json valid JSON"
          python3 -c "import json; json.load(open('hooks/hooks.json'))" && echo "✓ hooks.json valid JSON"
          echo "✅ All JSON files valid"

      - name: Validate SKILL.md frontmatter
        run: |
          echo "Checking SKILL.md frontmatter..."
          for skill_file in skills/*/SKILL.md; do
            if ! head -5 "$skill_file" | grep -q "^---"; then
              echo "✗ $skill_file missing YAML frontmatter"
              exit 1
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "✗ $skill_file missing 'description' in frontmatter"
              exit 1
            fi
            echo "✓ $skill_file"
          done
          echo "✅ All SKILL.md files have valid frontmatter"

      - name: Check agent frontmatter
        run: |
          echo "Checking agent frontmatter..."
          for agent_file in agents/*.md; do
            if ! head -3 "$agent_file" | grep -q "^---"; then
              echo "✗ $agent_file missing YAML frontmatter"
              exit 1
            fi
            echo "✓ $agent_file"
          done
          echo "✅ All agent files have frontmatter"

      - name: Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  superboom plugin validation PASSED ✅"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Skills:  $(ls skills/ | wc -l | tr -d ' ')"
          echo "Agents:  $(ls agents/*.md | wc -l | tr -d ' ')"
          echo "Version: $(python3 -c \"import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])\")"
